<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Focus Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-work">

  <div class="app-container">
    <div class="mode-tabs">
      <button id="work-tab" class="tab-btn active">Work</button>
      <button id="short-tab" class="tab-btn">Short Break</button>
      <button id="long-tab" class="tab-btn">Long Break</button>
    </div>

    <div class="timer-card">
      <h2 id="status-label">Time to Focus!</h2>
      <div class="time-display">
        <span id="minutes">25</span>:<span id="seconds">00</span>.<span id="ms-digits" class="ms-style">00</span>
      </div>

      <div class="controls">
        <button id="start-btn" class="btn btn-primary">Start</button>
        <button id="pause-btn" class="btn btn-secondary" disabled>Pause</button>
        <button id="reset-btn" class="btn btn-danger">Reset</button>
      </div>
    </div>

    <div class="dashboard-footer">
      <div class="metric">
        <span class="metric-label">Completed Sessions</span>
        <span id="session-count" class="metric-value">0</span>
      </div>
      <button id="settings-open-btn" class="settings-trigger">⚙️ Settings</button>
    </div>
  </div>

  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3>Timer Configurations (Minutes)</h3>
      <hr>
      <div class="settings-grid">
        <div class="input-group">
          <label for="input-work">Work Session</label>
          <input type="number" id="input-work" min="1" max="60" value="25">
        </div>
        <div class="input-group">
          <label for="input-short">Short Break</label>
          <input type="number" id="input-short" min="1" max="60" value="5">
        </div>
        <div class="input-group">
          <label for="input-long">Long Break</label>
          <input type="number" id="input-long" min="1" max="60" value="15">
        </div>
      </div>
      <div class="modal-actions">
        <button id="settings-save-btn" class="btn btn-primary">Save Changes</button>
        <button id="settings-close-btn" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
